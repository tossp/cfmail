name = "cfmail"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
RETENTION_DAYS_UNREAD = "7"
RETENTION_DAYS_READ = "3"
SENDER_BLACKLIST = ""
MAX_EMAIL_SIZE = "26214400"
MAX_ATTACHMENT_SIZE = "10485760"
WEBHOOK_URL = ""
WEBHOOK_SECRET = ""
GOTIFY_URL = ""
GOTIFY_TOKEN = ""
SITE_URL = ""

[triggers]
crons = ["0 3 * * *"]

[[ratelimits]]
binding = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

[[d1_databases]]
binding = "DB"
database_name = "cfmail-db"
database_id = "cfmail-db"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cfmail-emails"
